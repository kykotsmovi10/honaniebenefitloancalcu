<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Interest Rate Calculator</title>
<meta name="theme-color" content="#1e2b4d"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{
  --navy:#1e2b4d;
  --navy-deep:#172239;
  --navy-soft:#2b3652;
  --gold:#c3a163;
  --green:#6f7f2e;
  --green-text:#68762b;
  --green-deep:#3e4a1e;
  --green-bright:#a8c44a;
  --callout:#eef3d8;

  --panel:#f1f4f9;
  --panel-line:#dee1e9;
  --border:#dfe4ee;
  --card:#fff;

  --panel-dark:#141a26;
  --panel-dark-line:#2c3548;
  --panel-dark-muted:#9aa3b5;

  --ink:#1e2b4d;
  --muted:#1a1a1a;
  --dim:#7d8699;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--panel);color:var(--ink);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1}

/* ── MASTHEAD ── */
.bar{background:var(--navy);color:#fff;padding:22px 40px}
.bar h1{font-size:23px;font-weight:700;letter-spacing:-.4px;line-height:1.2}
.bar h1 span{color:var(--gold)}
.bar .tag{display:block;font-size:12.5px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-top:4px}

.wrap{max-width:960px;margin:0 auto;padding:24px 24px 60px}
.cols{display:flex;flex-wrap:wrap;gap:20px}

/* ── FORM CARD ── */
.formbox{flex:1 1 340px;min-width:290px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px 24px;box-shadow:0 2px 8px rgba(30,43,77,.07)}
.formhdr{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.row label{width:126px;flex-shrink:0;font-size:13px;font-weight:600;color:var(--muted);letter-spacing:-.1px}
.inp{flex:1;border:1.5px solid var(--border);background:var(--card);border-radius:8px;padding:9px 11px;font-size:15px;font-weight:600;font-family:inherit;color:var(--ink);min-width:0;outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,43,77,.08)}
.inp::placeholder{color:var(--dim);font-weight:500}
.termwrap{flex:1;display:flex;gap:8px;min-width:0}
.termcell{flex:1;display:flex;align-items:center;border:1.5px solid var(--border);background:var(--card);border-radius:8px;padding:0 11px;min-width:0;transition:border-color .15s,box-shadow .15s}
.termcell:focus-within{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,43,77,.08)}
.termcell input{border:none;outline:none;font-size:15px;font-weight:600;font-family:inherit;color:var(--ink);padding:9px 0;width:100%;min-width:0;background:transparent}
.termcell span{color:var(--dim);font-size:12px;padding-left:6px;white-space:nowrap}
.btns{display:flex;gap:10px;margin-top:18px}
.btn{border:none;border-radius:8px;font-family:inherit;font-size:14.5px;font-weight:600;padding:11px 24px;cursor:pointer;transition:filter .15s,background .15s}
.btn-go{background:var(--navy);color:#fff}
.btn-go:hover{filter:brightness(1.15)}
.btn-clear{background:var(--card);color:var(--muted);border:1.5px solid var(--border)}
.btn-clear:hover{background:var(--panel)}
.btn:focus-visible,.inp:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ── RESULTS (dark panel) ── */
.resbox{flex:1 1 340px;min-width:290px;background:var(--panel-dark);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
.reshdr{padding:18px 24px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.reshdr .lbl{font-size:12px;font-weight:600;color:var(--panel-dark-muted);text-transform:uppercase;letter-spacing:1.6px}
.savebtn{background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:6px;transition:background .15s}
.savebtn:hover{background:rgba(255,255,255,.2)}
.bigrate{padding:2px 24px 18px;font-size:52px;font-weight:800;color:var(--green-bright);letter-spacing:-2.2px;line-height:1.1}
.resrows{padding:0 24px 20px}
.resrow{display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:13px 0;border-top:1px solid var(--panel-dark-line);font-size:14px}
.resrow .k{color:var(--panel-dark-muted);font-weight:500}
.resrow .v{color:#fff;font-weight:600;white-space:nowrap}
.resrow.tot .k{color:#fff;font-weight:700;font-size:15px}
.resrow.tot .v{font-weight:700;font-size:17px}
.err{margin:0 24px 22px;background:rgba(176,48,48,.16);border:1px solid rgba(224,138,138,.4);color:#f0c8c8;padding:13px 15px;border-radius:8px;font-size:13px;line-height:1.55}

/* ── CHARTS ── */
.charts{display:flex;flex-wrap:wrap;gap:20px;margin-top:20px}
.chartbox{flex:1 1 340px;min-width:290px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 2px 8px rgba(30,43,77,.07);overflow:hidden}
.charthdr{background:var(--navy);color:#fff;padding:14px 20px;font-size:14px;font-weight:700;letter-spacing:-.2px}
.chartbody{padding:20px;text-align:center}
.legend{display:flex;flex-direction:column;gap:7px;font-size:13px;font-weight:600;color:var(--muted)}
.legend div{display:flex;align-items:center;gap:9px}
.swatch{width:22px;height:4px;border-radius:2px;flex-shrink:0}
.donutwrap{display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:14px;margin-top:14px}
.tbl th{background:var(--navy);color:#fff;padding:11px 12px;text-align:right;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.tbl th:first-child{text-align:left}
.tbl td{padding:10px 12px;text-align:right;border-bottom:1px solid #eef1f6;letter-spacing:-.2px}
.tbl td:first-child{text-align:left;color:var(--dim)}
.tbl tr:nth-child(even) td{background:var(--panel)}
.toggle{background:var(--card);border:1.5px solid var(--navy);color:var(--navy);border-radius:8px;padding:11px 24px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:22px;transition:background .18s,color .18s}
.toggle:hover{background:var(--navy);color:#fff}
.note{font-size:12.5px;color:var(--dim);margin-top:24px;line-height:1.65;border-top:1px solid var(--border);padding-top:16px}

@media print{.no-print{display:none!important}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}
@media(max-width:700px){.bar{padding:18px 20px}.wrap{padding:16px 14px 40px}.row label{width:104px;font-size:12.5px}.bigrate{font-size:42px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useMemo} = React;

const money = v => v==null||!isFinite(v) ? "$0.00"
  : new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(v);
const money0 = v => v==null||!isFinite(v) ? "$0"
  : new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(v);

/* Payment for a given annual rate. */
function paymentAt(P, annual, n){
  if(n<=0) return 0;
  const r = annual/12;
  if(Math.abs(r) < 1e-12) return P/n;
  return P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}

/* Solve for the annual rate by bisection — there is no closed form.
   Payment rises monotonically with rate, so bisection always converges. */
function solveRate(P, n, payment){
  if(!(P>0) || !(n>0) || !(payment>0)) return {error:"Enter a loan amount, term, and monthly payment."};
  const total = payment*n;
  if(total < P) return {error:"Those payments never repay the loan. The monthly payment must be at least "+money(P/n)+" for a "+n+"-month term."};
  if(Math.abs(total-P) < 0.005) return {rate:0};   // payments exactly equal the loan: 0% interest
  let lo=0, hi=1;                              // 0%–100%
  while(paymentAt(P,hi,n) < payment && hi < 100) hi*=2;
  for(let i=0;i<300;i++){
    const mid=(lo+hi)/2;
    if(paymentAt(P,mid,n) < payment) lo=mid; else hi=mid;
  }
  return {rate:(lo+hi)/2};
}

/* Month-by-month schedule at the solved rate. */
function schedule(P, annual, n, payment){
  const r=annual/12; let bal=P; const rows=[];
  let cumInt=0, cumPay=0;
  for(let m=1;m<=n;m++){
    const interest=bal*r;
    let principal=payment-interest;
    if(m===n || principal>bal) principal=bal;   // final payment clears the balance
    bal=Math.max(0,bal-principal);
    cumInt+=interest; cumPay+=interest+principal;
    rows.push({m,payment:interest+principal,principal,interest,balance:bal,cumInt,cumPay});
  }
  return rows;
}

function Field({label,value,onChange,prefix}){
  return(
    <div className="row">
      <label>{label}</label>
      <input className="inp" value={value} inputMode="decimal"
        onChange={e=>onChange(e.target.value)} aria-label={label}/>
    </div>);
}

/* Line chart: balance, cumulative interest, cumulative payment. */
function LineChart({rows,years}){
  if(!rows.length) return null;
  const W=360,H=200,PL=48,PR=12,PT=12,PB=34;
  const maxY=Math.max(rows[0].balance, rows[rows.length-1].cumPay);
  const n=rows.length;
  const x=m=>PL+(m/n)*(W-PL-PR);
  const y=v=>PT+(1-v/maxY)*(H-PT-PB);
  const path=(get)=>rows.map((r,i)=>`${i===0?'M':'L'}${x(r.m).toFixed(1)},${y(get(r)).toFixed(1)}`).join(' ');
  const ticks=[0,.25,.5,.75,1].map(f=>f*maxY);
  const yearTicks=[]; for(let i=0;i<=years;i++) yearTicks.push(i);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:400}} role="img" aria-label="Loan amortization graph">
      {ticks.map((t,i)=>(
        <g key={i}>
          <line x1={PL} y1={y(t)} x2={W-PR} y2={y(t)} stroke="#eef1f6" strokeWidth=".8"/>
          <text x={PL-6} y={y(t)+4} textAnchor="end" fontSize="9.5" fill="#7d8699">
            {t>=1000?'$'+Math.round(t/1000)+'K':'$'+Math.round(t)}
          </text>
        </g>))}
      {yearTicks.map((yr,i)=>(
        <text key={i} x={x(yr*12)} y={H-14} textAnchor="middle" fontSize="9.5" fill="#7d8699">{yr}</text>))}
      <text x={(PL+W-PR)/2} y={H-2} textAnchor="middle" fontSize="10.5" fill="#1a1a1a" fontWeight="700">Year</text>
      <line x1={PL} y1={PT} x2={PL} y2={y(0)} stroke="#dfe4ee" strokeWidth="1"/>
      <line x1={PL} y1={y(0)} x2={W-PR} y2={y(0)} stroke="#dfe4ee" strokeWidth="1"/>
      <path d={path(r=>r.balance)} fill="none" stroke="#1e2b4d" strokeWidth="2.4"/>
      <path d={path(r=>r.cumInt)}  fill="none" stroke="#6f7f2e" strokeWidth="2.4"/>
      <path d={path(r=>r.cumPay)}  fill="none" stroke="#a9afbc" strokeWidth="2.2" strokeDasharray="6 4"/>
    </svg>);
}

/* Donut: principal vs interest share of total paid. */
function Donut({principal,interest}){
  const total=principal+interest;
  if(!(total>0)) return null;
  const pctP=principal/total, pctI=interest/total;
  const R=64, r=34, cx=78, cy=78;
  const arc=(start,frac,color,key)=>{
    if(frac<=0) return null;
    if(frac>=0.9999)
      return <circle key={key} cx={cx} cy={cy} r={(R+r)/2} fill="none" stroke={color} strokeWidth={R-r}/>;
    const a0=start*2*Math.PI-Math.PI/2, a1=(start+frac)*2*Math.PI-Math.PI/2;
    const big=frac>0.5?1:0;
    const p=(rad,a)=>[cx+rad*Math.cos(a),cy+rad*Math.sin(a)];
    const [x0,y0]=p(R,a0),[x1,y1]=p(R,a1),[x2,y2]=p(r,a1),[x3,y3]=p(r,a0);
    return <path key={key} d={`M${x0},${y0} A${R},${R} 0 ${big} 1 ${x1},${y1} L${x2},${y2} A${r},${r} 0 ${big} 0 ${x3},${y3} Z`} fill={color}/>;
  };
  const lblPos=(start,frac,rad)=>{
    const a=(start+frac/2)*2*Math.PI-Math.PI/2;
    return [cx+rad*Math.cos(a), cy+rad*Math.sin(a)];
  };
  const [px,py]=lblPos(0,pctP,(R+r)/2);
  const [ix,iy]=lblPos(pctP,pctI,(R+r)/2);
  return(
    <div className="donutwrap">
      <svg viewBox="0 0 156 156" style={{width:150,height:150}} role="img"
           aria-label={`Principal ${Math.round(pctP*100)} percent, interest ${Math.round(pctI*100)} percent`}>
        {arc(0,pctP,'#1e2b4d','p')}
        {arc(pctP,pctI,'#a8c44a','i')}
        {pctP>0.06&&<text x={px} y={py+4} textAnchor="middle" fontSize="13" fontWeight="700" fill="#fff">{Math.round(pctP*100)}%</text>}
        {pctI>0.06&&<text x={ix} y={iy+4} textAnchor="middle" fontSize="13" fontWeight="700" fill="#3e4a1e">{Math.round(pctI*100)}%</text>}
      </svg>
      <div className="legend">
        <div><span className="swatch" style={{background:'#1e2b4d',height:13,width:13,borderRadius:3}}/>Principal</div>
        <div><span className="swatch" style={{background:'#a8c44a',height:13,width:13,borderRadius:3}}/>Interest</div>
      </div>
    </div>);
}

function App(){
  const [amount,setAmount]   = useState("32,000");
  const [years,setYears]     = useState("3");
  const [months,setMonths]   = useState("0");
  const [payment,setPayment] = useState("960");
  const [showTable,setShowTable] = useState(false);

  // Committed values — results only update when Calculate is pressed.
  const [calc,setCalc] = useState({amount:32000,n:36,payment:960});

  const num = s => {
    const v = parseFloat(String(s).replace(/[$,\s]/g,""));
    return isFinite(v) ? v : 0;
  };

  const run = () => {
    const n = Math.round(num(years)*12 + num(months));
    setCalc({amount:num(amount), n, payment:num(payment)});
    setShowTable(false);
  };
  const clear = () => {
    setAmount(""); setYears(""); setMonths(""); setPayment("");
    setCalc({amount:0,n:0,payment:0}); setShowTable(false);
  };

  const result = useMemo(()=>{
    const {amount:P,n,payment:pay} = calc;
    const solved = solveRate(P,n,pay);
    if(solved.error) return {error:solved.error};
    const rows = schedule(P, solved.rate, n, pay);
    const totalPaid = rows.reduce((s,r)=>s+r.payment,0);
    const totalInterest = rows.reduce((s,r)=>s+r.interest,0);
    return {rate:solved.rate, rows, totalPaid, totalInterest, n, P};
  },[calc]);

  const onKey = e => { if(e.key==='Enter') run(); };

  return(
    <div onKeyDown={onKey}>

      <header className="bar">
        <h1>Interest Rate <span>Calculator</span></h1>
        <span className="tag">What rate is this loan really charging?</span>
      </header>

      <div className="wrap">
      <div className="cols">
        <div className="formbox">
          <div className="formhdr">Loan details</div>
          <Field label="Loan amount"    value={amount}  onChange={setAmount}/>
          <div className="row">
            <label>Loan term</label>
            <div className="termwrap">
              <div className="termcell"><input value={years}  onChange={e=>setYears(e.target.value)}  inputMode="numeric" aria-label="Loan term years"/><span>years</span></div>
              <div className="termcell"><input value={months} onChange={e=>setMonths(e.target.value)} inputMode="numeric" aria-label="Loan term months"/><span>months</span></div>
            </div>
          </div>
          <Field label="Monthly payment" value={payment} onChange={setPayment}/>
          <div className="btns no-print">
            <button className="btn btn-go" onClick={run}>Calculate</button>
            <button className="btn btn-clear" onClick={clear}>Clear</button>
          </div>
        </div>

        <div className="resbox">
          <div className="reshdr">
            <span className="lbl">Interest rate</span>
            <button className="savebtn no-print" onClick={()=>window.print()} title="Save or print results">Save</button>
          </div>

          {result.error
            ? <><div className="bigrate">—</div><div className="err">{result.error}</div></>
            : <>
                <div className="bigrate">{(result.rate*100).toFixed(3)}%</div>
                <div className="resrows">
                  <div className="resrow"><span className="k">Loan amount</span><span className="v">{money(result.P)}</span></div>
                  <div className="resrow"><span className="k">Total of {result.n} monthly payments</span><span className="v">{money(result.totalPaid)}</span></div>
                  <div className="resrow tot"><span className="k">Total interest paid</span><span className="v">{money(result.totalInterest)}</span></div>
                </div>
              </>}
        </div>
      </div>

      {!result.error && <div>
        <div className="charts">
          <div className="chartbox">
            <div className="charthdr">Loan amortization</div>
            <div className="chartbody">
            <div style={{display:'flex',justifyContent:'center',gap:14,flexWrap:'wrap',alignItems:'center'}}>
              <div className="legend" style={{textAlign:'left'}}>
                <div><span className="swatch" style={{background:'#1e2b4d'}}/>Balance</div>
                <div><span className="swatch" style={{background:'#6f7f2e'}}/>Interest</div>
                <div><span className="swatch" style={{background:'#a9afbc'}}/>Payment</div>
              </div>
            </div>
            <LineChart rows={result.rows} years={Math.ceil(result.n/12)}/>
            </div>
          </div>

          <div className="chartbox">
            <div className="charthdr">Payment breakdown</div>
            <div className="chartbody">
              <Donut principal={result.P} interest={result.totalInterest}/>
            </div>
          </div>
        </div>

        <button className="toggle no-print" onClick={()=>setShowTable(!showTable)}>
          {showTable?'Hide amortization schedule':'Show amortization schedule'}
        </button>

        {showTable && <table className="tbl">
          <thead><tr><th>Month</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead>
          <tbody>{result.rows.map(r=>(
            <tr key={r.m}>
              <td>{r.m}</td><td>{money(r.payment)}</td><td>{money(r.principal)}</td>
              <td>{money(r.interest)}</td><td>{money(r.balance)}</td>
            </tr>))}</tbody>
        </table>}
      </div>}

      <p className="note">
        The Interest Rate Calculator determines real interest rates on loans with fixed terms and monthly payments.
        Enter the amount borrowed, the length of the loan, and what you pay each month — the calculator solves for the
        annual rate that makes those numbers work. Results are estimates for illustration only and assume a fixed rate
        with equal monthly payments and no fees.
      </p>
      </div>
    </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
