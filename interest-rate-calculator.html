<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Interest Rate Calculator</title>
<meta name="theme-color" content="#336699"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{
  --blue:#336699;        /* header bar, related buttons */
  --green-hdr:#518428;   /* Results header */
  --green-btn:#4c7b25;   /* Calculate button */
  --gray-btn:#ababab;    /* Clear button */
  --panel:#eeeeee;       /* form panel background */
  --panel-line:#bbbbbb;  /* form panel border */
  --stripe:#dddddd;      /* results row stripe */
  --chart-blue:#2b7ddb;  /* balance line, principal */
  --chart-green:#8bbc21; /* interest line, interest slice */
  --chart-red:#910000;   /* cumulative payment line */
  --ink:#000;
  --border:#767676;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;background:#fff;color:var(--ink);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased}
.wrap{max-width:790px;margin:0 auto;padding:14px}
.bar{background:var(--blue);color:#fff;font-weight:700;font-size:16px;padding:13px 18px;display:flex;align-items:center;gap:12px;border-radius:3px}
.bar .chev{width:26px;height:26px;border-radius:50%;background:#fff;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cols{display:flex;flex-wrap:wrap;gap:26px;margin-top:16px}
.formbox{flex:1 1 330px;min-width:290px;background:var(--panel);border:1px solid var(--panel-line);border-radius:3px;padding:16px 18px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.row label{width:118px;flex-shrink:0;font-size:15px}
.inp{flex:1;border:1px solid var(--border);background:#fff;border-radius:3px;padding:7px 9px;font-size:16px;font-family:inherit;min-width:0}
.inp:focus{outline:2px solid var(--blue);outline-offset:-1px}
.termwrap{flex:1;display:flex;gap:8px;min-width:0}
.termcell{flex:1;display:flex;align-items:center;border:1px solid var(--border);background:#fff;border-radius:3px;padding:0 9px;min-width:0}
.termcell input{border:none;outline:none;font-size:16px;font-family:inherit;padding:7px 0;width:100%;min-width:0;background:transparent}
.termcell span{color:#555;font-size:14px;padding-left:6px;white-space:nowrap}
.btns{display:flex;gap:9px;justify-content:center;margin-top:16px}
.btn{border:none;border-radius:3px;font-family:inherit;font-size:16px;font-weight:700;color:#fff;padding:10px 22px;cursor:pointer;display:flex;align-items:center;gap:9px}
.btn-go{background:var(--green-btn)}
.btn-go:hover{filter:brightness(1.12)}
.btn-clear{background:var(--gray-btn)}
.btn-clear:hover{filter:brightness(1.06)}
.btn .circ{width:19px;height:19px;border-radius:50%;background:rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;font-size:10px}
.resbox{flex:1 1 330px;min-width:290px}
.reshdr{background:var(--green-hdr);color:#fff;font-size:21px;font-weight:700;padding:9px 14px;border-radius:3px 3px 0 0;display:flex;justify-content:space-between;align-items:center}
.savebtn{background:none;border:none;color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;font-family:inherit;line-height:1;opacity:.95}
.savebtn:hover{opacity:1}
.savebtn small{font-size:8px;margin-top:1px}
.resrow{display:flex;justify-content:space-between;gap:14px;padding:7px 14px;font-size:15px}
.resrow.hi{background:var(--stripe);font-weight:700}
.resrow .v{font-weight:700;white-space:nowrap}
.err{background:#fdecea;border:1px solid #d9534f;color:#8a1f1a;padding:10px 13px;border-radius:3px;font-size:14px;margin-top:12px}
.charts{display:flex;flex-wrap:wrap;gap:26px;margin-top:26px}
.chartbox{flex:1 1 330px;min-width:290px;text-align:center}
.charttitle{font-size:18px;font-weight:700;margin-bottom:8px}
.legend{display:flex;flex-direction:column;gap:5px;font-size:15px;font-weight:700}
.legend div{display:flex;align-items:center;gap:8px}
.swatch{width:26px;height:5px;flex-shrink:0}
.donutwrap{display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap}
.tbl{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px}
.tbl th{background:var(--blue);color:#fff;padding:7px 9px;text-align:right;font-size:13px}
.tbl th:first-child{text-align:left}
.tbl td{padding:6px 9px;text-align:right;border-bottom:1px solid #e4e4e4}
.tbl td:first-child{text-align:left}
.tbl tr:nth-child(even) td{background:#f7f7f7}
.toggle{background:var(--panel);border:1px solid var(--panel-line);border-radius:3px;padding:9px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:22px}
.toggle:hover{background:#e4e4e4}
.note{font-size:13px;color:#333;margin-top:22px;line-height:1.6;border-top:1px solid #ddd;padding-top:12px}
@media print{.no-print{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useMemo} = React;

const money = v => v==null||!isFinite(v) ? "$0.00"
  : new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(v);
const money0 = v => v==null||!isFinite(v) ? "$0"
  : new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(v);

/* Payment for a given annual rate. */
function paymentAt(P, annual, n){
  if(n<=0) return 0;
  const r = annual/12;
  if(Math.abs(r) < 1e-12) return P/n;
  return P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}

/* Solve for the annual rate by bisection — there is no closed form.
   Payment rises monotonically with rate, so bisection always converges. */
function solveRate(P, n, payment){
  if(!(P>0) || !(n>0) || !(payment>0)) return {error:"Enter a loan amount, term, and monthly payment."};
  const total = payment*n;
  if(total < P) return {error:"Those payments never repay the loan. The monthly payment must be at least "+money(P/n)+" for a "+n+"-month term."};
  if(Math.abs(total-P) < 0.005) return {rate:0};   // payments exactly equal the loan: 0% interest
  let lo=0, hi=1;                              // 0%–100%
  while(paymentAt(P,hi,n) < payment && hi < 100) hi*=2;
  for(let i=0;i<300;i++){
    const mid=(lo+hi)/2;
    if(paymentAt(P,mid,n) < payment) lo=mid; else hi=mid;
  }
  return {rate:(lo+hi)/2};
}

/* Month-by-month schedule at the solved rate. */
function schedule(P, annual, n, payment){
  const r=annual/12; let bal=P; const rows=[];
  let cumInt=0, cumPay=0;
  for(let m=1;m<=n;m++){
    const interest=bal*r;
    let principal=payment-interest;
    if(m===n || principal>bal) principal=bal;   // final payment clears the balance
    bal=Math.max(0,bal-principal);
    cumInt+=interest; cumPay+=interest+principal;
    rows.push({m,payment:interest+principal,principal,interest,balance:bal,cumInt,cumPay});
  }
  return rows;
}

function Field({label,value,onChange,prefix}){
  return(
    <div className="row">
      <label>{label}</label>
      <input className="inp" value={value} inputMode="decimal"
        onChange={e=>onChange(e.target.value)} aria-label={label}/>
    </div>);
}

/* Line chart: balance, cumulative interest, cumulative payment. */
function LineChart({rows,years}){
  if(!rows.length) return null;
  const W=360,H=200,PL=48,PR=12,PT=12,PB=34;
  const maxY=Math.max(rows[0].balance, rows[rows.length-1].cumPay);
  const n=rows.length;
  const x=m=>PL+(m/n)*(W-PL-PR);
  const y=v=>PT+(1-v/maxY)*(H-PT-PB);
  const path=(get)=>rows.map((r,i)=>`${i===0?'M':'L'}${x(r.m).toFixed(1)},${y(get(r)).toFixed(1)}`).join(' ');
  const ticks=[0,.25,.5,.75,1].map(f=>f*maxY);
  const yearTicks=[]; for(let i=0;i<=years;i++) yearTicks.push(i);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:400}} role="img" aria-label="Loan amortization graph">
      {ticks.map((t,i)=>(
        <g key={i}>
          <line x1={PL} y1={y(t)} x2={W-PR} y2={y(t)} stroke="#ccc" strokeWidth=".7"/>
          <text x={PL-6} y={y(t)+4} textAnchor="end" fontSize="9" fill="#333">
            {t>=1000?'$'+Math.round(t/1000)+'K':'$'+Math.round(t)}
          </text>
        </g>))}
      {yearTicks.map((yr,i)=>(
        <text key={i} x={x(yr*12)} y={H-14} textAnchor="middle" fontSize="9" fill="#333">{yr}</text>))}
      <text x={(PL+W-PR)/2} y={H-2} textAnchor="middle" fontSize="10" fill="#000" fontWeight="700">Year</text>
      <line x1={PL} y1={PT} x2={PL} y2={y(0)} stroke="#999" strokeWidth="1"/>
      <line x1={PL} y1={y(0)} x2={W-PR} y2={y(0)} stroke="#999" strokeWidth="1"/>
      <path d={path(r=>r.balance)} fill="none" stroke="var(--chart-blue)" strokeWidth="2"/>
      <path d={path(r=>r.cumInt)}  fill="none" stroke="var(--chart-green)" strokeWidth="2"/>
      <path d={path(r=>r.cumPay)}  fill="none" stroke="var(--chart-red)" strokeWidth="2"/>
    </svg>);
}

/* Donut: principal vs interest share of total paid. */
function Donut({principal,interest}){
  const total=principal+interest;
  if(!(total>0)) return null;
  const pctP=principal/total, pctI=interest/total;
  const R=64, r=34, cx=78, cy=78;
  const arc=(start,frac,color,key)=>{
    if(frac<=0) return null;
    if(frac>=0.9999)
      return <circle key={key} cx={cx} cy={cy} r={(R+r)/2} fill="none" stroke={color} strokeWidth={R-r}/>;
    const a0=start*2*Math.PI-Math.PI/2, a1=(start+frac)*2*Math.PI-Math.PI/2;
    const big=frac>0.5?1:0;
    const p=(rad,a)=>[cx+rad*Math.cos(a),cy+rad*Math.sin(a)];
    const [x0,y0]=p(R,a0),[x1,y1]=p(R,a1),[x2,y2]=p(r,a1),[x3,y3]=p(r,a0);
    return <path key={key} d={`M${x0},${y0} A${R},${R} 0 ${big} 1 ${x1},${y1} L${x2},${y2} A${r},${r} 0 ${big} 0 ${x3},${y3} Z`} fill={color}/>;
  };
  const lblPos=(start,frac,rad)=>{
    const a=(start+frac/2)*2*Math.PI-Math.PI/2;
    return [cx+rad*Math.cos(a), cy+rad*Math.sin(a)];
  };
  const [px,py]=lblPos(0,pctP,(R+r)/2);
  const [ix,iy]=lblPos(pctP,pctI,(R+r)/2);
  return(
    <div className="donutwrap">
      <svg viewBox="0 0 156 156" style={{width:150,height:150}} role="img"
           aria-label={`Principal ${Math.round(pctP*100)} percent, interest ${Math.round(pctI*100)} percent`}>
        {arc(0,pctP,'var(--chart-blue)','p')}
        {arc(pctP,pctI,'var(--chart-green)','i')}
        {pctP>0.06&&<text x={px} y={py+4} textAnchor="middle" fontSize="13" fontWeight="700" fill="#fff">{Math.round(pctP*100)}%</text>}
        {pctI>0.06&&<text x={ix} y={iy+4} textAnchor="middle" fontSize="13" fontWeight="700" fill="#fff">{Math.round(pctI*100)}%</text>}
      </svg>
      <div className="legend">
        <div><span className="swatch" style={{background:'var(--chart-blue)',height:14,width:14}}/>Principal</div>
        <div><span className="swatch" style={{background:'var(--chart-green)',height:14,width:14}}/>Interest</div>
      </div>
    </div>);
}

function App(){
  const [amount,setAmount]   = useState("32,000");
  const [years,setYears]     = useState("3");
  const [months,setMonths]   = useState("0");
  const [payment,setPayment] = useState("960");
  const [showTable,setShowTable] = useState(false);

  // Committed values — results only update when Calculate is pressed.
  const [calc,setCalc] = useState({amount:32000,n:36,payment:960});

  const num = s => {
    const v = parseFloat(String(s).replace(/[$,\s]/g,""));
    return isFinite(v) ? v : 0;
  };

  const run = () => {
    const n = Math.round(num(years)*12 + num(months));
    setCalc({amount:num(amount), n, payment:num(payment)});
    setShowTable(false);
  };
  const clear = () => {
    setAmount(""); setYears(""); setMonths(""); setPayment("");
    setCalc({amount:0,n:0,payment:0}); setShowTable(false);
  };

  const result = useMemo(()=>{
    const {amount:P,n,payment:pay} = calc;
    const solved = solveRate(P,n,pay);
    if(solved.error) return {error:solved.error};
    const rows = schedule(P, solved.rate, n, pay);
    const totalPaid = rows.reduce((s,r)=>s+r.payment,0);
    const totalInterest = rows.reduce((s,r)=>s+r.interest,0);
    return {rate:solved.rate, rows, totalPaid, totalInterest, n, P};
  },[calc]);

  const onKey = e => { if(e.key==='Enter') run(); };

  return(
    <div className="wrap" onKeyDown={onKey}>

      <div className="bar">
        <span className="chev" aria-hidden="true">▼</span>
        <span>Modify the values and click the Calculate button to use</span>
      </div>

      <div className="cols">
        <div className="formbox">
          <Field label="Loan amount"    value={amount}  onChange={setAmount}/>
          <div className="row">
            <label>Loan term</label>
            <div className="termwrap">
              <div className="termcell"><input value={years}  onChange={e=>setYears(e.target.value)}  inputMode="numeric" aria-label="Loan term years"/><span>years</span></div>
              <div className="termcell"><input value={months} onChange={e=>setMonths(e.target.value)} inputMode="numeric" aria-label="Loan term months"/><span>months</span></div>
            </div>
          </div>
          <Field label="Monthly payment" value={payment} onChange={setPayment}/>
          <div className="btns no-print">
            <button className="btn btn-go" onClick={run}>Calculate <span className="circ">▶</span></button>
            <button className="btn btn-clear" onClick={clear}>Clear</button>
          </div>
        </div>

        <div className="resbox">
          <div className="reshdr">
            <span>Results</span>
            <button className="savebtn no-print" onClick={()=>window.print()} title="Save or print results">
              <span style={{fontSize:15}}>▤</span><small>save</small>
            </button>
          </div>

          {result.error
            ? <div className="err">{result.error}</div>
            : <div>
                <div className="resrow hi"><span>Interest rate</span><span className="v">{(result.rate*100).toFixed(3)}%</span></div>
                <div className="resrow"><span>Total of {result.n} monthly payments</span><span className="v">{money(result.totalPaid)}</span></div>
                <div className="resrow"><span>Total interest paid</span><span className="v">{money(result.totalInterest)}</span></div>
              </div>}
        </div>
      </div>

      {!result.error && <div>
        <div className="charts">
          <div className="chartbox">
            <div className="charttitle">Loan Amortization Graph</div>
            <div style={{display:'flex',justifyContent:'center',gap:14,flexWrap:'wrap',alignItems:'center'}}>
              <div className="legend" style={{textAlign:'left'}}>
                <div><span className="swatch" style={{background:'var(--chart-blue)'}}/>Balance</div>
                <div><span className="swatch" style={{background:'var(--chart-green)'}}/>Interest</div>
                <div><span className="swatch" style={{background:'var(--chart-red)'}}/>Payment</div>
              </div>
            </div>
            <LineChart rows={result.rows} years={Math.ceil(result.n/12)}/>
          </div>

          <div className="chartbox">
            <div className="charttitle">Payment Breakdown</div>
            <Donut principal={result.P} interest={result.totalInterest}/>
          </div>
        </div>

        <button className="toggle no-print" onClick={()=>setShowTable(!showTable)}>
          {showTable?'Hide amortization schedule':'Show amortization schedule'}
        </button>

        {showTable && <table className="tbl">
          <thead><tr><th>Month</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead>
          <tbody>{result.rows.map(r=>(
            <tr key={r.m}>
              <td>{r.m}</td><td>{money(r.payment)}</td><td>{money(r.principal)}</td>
              <td>{money(r.interest)}</td><td>{money(r.balance)}</td>
            </tr>))}</tbody>
        </table>}
      </div>}

      <p className="note">
        The Interest Rate Calculator determines real interest rates on loans with fixed terms and monthly payments.
        Enter the amount borrowed, the length of the loan, and what you pay each month — the calculator solves for the
        annual rate that makes those numbers work. Results are estimates for illustration only and assume a fixed rate
        with equal monthly payments and no fees.
      </p>
    </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
