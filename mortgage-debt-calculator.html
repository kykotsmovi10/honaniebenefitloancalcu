<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mortgage Debt Calculator</title>
<meta name="theme-color" content="#1e2b4d"/><meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{
  --navy:#1e2b4d;
  --navy-deep:#172239;
  --navy-soft:#2b3652;
  --gold:#c3a163;
  --green:#6f7f2e;
  --green-bright:#a8c44a;
  --green-deep:#3e4a1e;
  --callout:#eef3d8;
  --panel:#f1f4f9;
  --panel-dark:#141a26;
  --panel-dark-line:#2c3548;
  --panel-dark-muted:#9aa3b5;
  --panel-line:#dee1e9;
  --border:#dfe4ee;
  --muted:#1a1a1a;
  --dim:#7d8699;
  --ink:#1e2b4d;
  --card:#fff;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--panel);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1}
@media print{body{background:#fff;font-size:10px}.no-print{display:none!important}.card{box-shadow:none!important;border:1px solid #ddd!important;break-inside:avoid}.present-overlay{position:relative!important;background:#fff!important;overflow:visible!important;padding:0!important}.present-page{box-shadow:none!important;max-height:none!important;overflow:visible!important;border:none!important;max-width:100%!important;border-radius:0!important}}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:var(--panel)}::-webkit-scrollbar-thumb{background:#c7cddb;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp .45s ease-out both}
@media (prefers-reduced-motion:reduce){.animate-in{animation:none}*{transition:none!important}}
@keyframes modalIn{from{opacity:0;transform:scale(.98) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus-visible,select:focus-visible,button:focus-visible{outline:2px solid var(--navy);outline-offset:2px}
.field{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;transition:border-color .18s,box-shadow .18s}
.field:focus-within{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,43,77,.08)}
.field input{border:none;outline:none;background:transparent;font-size:16px;font-weight:500;color:var(--ink);width:100%;font-family:inherit}
.field input::placeholder{color:#aab1c0}
.lbl{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.1px}
.present-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(23,34,57,.62);backdrop-filter:blur(8px);z-index:2000;overflow-y:auto;animation:overlayIn .25s ease-out;padding:24px}
.present-page{background:#fff;border-radius:16px;box-shadow:0 24px 80px rgba(23,34,57,.3);max-width:880px;width:100%;margin:0 auto;animation:modalIn .35s ease-out;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo}=React;
const fmt=v=>{if(v==null||isNaN(v))return"$0.00";return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(v)};
const fmt0=v=>{if(v==null||isNaN(v))return"$0";return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(v)};
const fmtPct=v=>((v||0)*100).toFixed(3)+"%";
function monthlyPI(p,ar,tm){if(p<=0||tm<=0)return 0;if(ar===0)return p/tm;const r=ar/12;return(p*r*Math.pow(1+r,tm))/(Math.pow(1+r,tm)-1)}
function amortize(p,ar,tm,extra){const r=ar/12,base=monthlyPI(p,ar,tm);let bal=p;const rows=[];let totI=0,totP=0;for(let m=1;m<=tm&&bal>.005;m++){const ip=bal*r;let pp=base-ip+extra;if(pp>bal)pp=bal;bal=Math.max(0,bal-pp);totI+=ip;totP+=pp;rows.push({month:m,payment:ip+pp,principal:pp,interest:ip,balance:bal})}return{rows,totalInterest:totI,months:rows.length}}
function findEffRate(p,tI,tm){let lo=0,hi=.5;for(let i=0;i<80;i++){const mid=(lo+hi)/2,r=mid/12;if(!r){lo=mid;continue}const pmt=(p*r*Math.pow(1+r,tm))/(Math.pow(1+r,tm)-1);if(pmt*tm-p<tI)lo=mid;else hi=mid}return(lo+hi)/2}

/* ── Building blocks ───────────────────────────────────────── */

function Card({children,title,subtitle,delay}){return(
  <div className="card animate-in" style={{background:'#fff',border:'1px solid var(--border)',borderRadius:'var(--radius)',overflow:'hidden',animationDelay:(delay||0)+'ms'}}>
    {title&&<div style={{background:'var(--navy)',padding:'16px 24px'}}>
      <h2 style={{fontSize:17,fontWeight:700,color:'#fff',letterSpacing:-.3}}>{title}</h2>
      {subtitle&&<p style={{fontSize:12,color:'rgba(255,255,255,.62)',marginTop:3,fontWeight:400}}>{subtitle}</p>}
    </div>}
    <div style={{padding:'24px'}}>{children}</div>
  </div>)}

function Inp({label,value,onChange,prefix,suffix,step,hint}){return(
  <div style={{display:'flex',flexDirection:'column',gap:7,flex:1,minWidth:130}}>
    <label className="lbl">{label}</label>
    <div className="field">
      {prefix&&<span style={{color:'var(--dim)',fontSize:15,fontWeight:500,userSelect:'none'}}>{prefix}</span>}
      <input type="number" value={value} step={step||"any"} onChange={e=>onChange(e.target.value===""?"":Number(e.target.value))}/>
      {suffix&&<span style={{color:'var(--dim)',fontSize:14,userSelect:'none'}}>{suffix}</span>}
    </div>
    {hint&&<div style={{fontSize:11.5,color:'var(--muted)'}}>{hint}</div>}
  </div>)}

function ModeInp({label,value,onChange,mode,onModeChange,prefix,suffix,step,hint}){return(
  <div style={{display:'flex',flexDirection:'column',gap:7,flex:1,minWidth:160}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
      <label className="lbl">{label}</label>
      <select value={mode} onChange={e=>onModeChange(e.target.value)} className="no-print" style={{fontSize:11,fontWeight:600,color:'var(--navy)',background:'var(--panel)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 7px',cursor:'pointer',fontFamily:'inherit'}}>
        <option value="annual">Annual</option><option value="monthly">Monthly</option>
      </select>
    </div>
    <div className="field">
      {prefix&&<span style={{color:'var(--dim)',fontSize:15,fontWeight:500,userSelect:'none'}}>{prefix}</span>}
      <input type="number" value={value} step={step||"any"} onChange={e=>onChange(e.target.value===""?"":Number(e.target.value))}/>
      {suffix&&<span style={{color:'var(--dim)',fontSize:14,userSelect:'none'}}>{suffix}</span>}
    </div>
    {hint&&<div style={{fontSize:11.5,color:'var(--muted)'}}>{hint}</div>}
  </div>)}

function LoanTypeToggle({value,onChange}){const opts=['Conventional','FHA','VA'];return(
  <div style={{display:'flex',flexDirection:'column',gap:7}}>
    <label className="lbl">Loan type</label>
    <div style={{display:'flex',background:'#fff',border:'1.5px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
      {opts.map((o,i)=>{const on=value===o;return(
        <button key={o} onClick={()=>onChange(o)} style={{flex:1,background:on?'var(--navy)':'#fff',color:on?'#fff':'var(--dim)',border:'none',borderLeft:i>0?'1px solid var(--border)':'none',padding:'12px 8px',fontSize:15,fontWeight:on?600:500,cursor:'pointer',fontFamily:'inherit',transition:'background .18s,color .18s'}}>{o}</button>)})}
    </div>
  </div>)}

/* A single line in the right-hand summary panel. `dark` inverts it for the dark panel. */
function SumRow({label,value,bold,accent,dark}){return(
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:16,padding:'13px 0',borderTop:`1px solid ${dark?'var(--panel-dark-line)':'var(--panel-line)'}`}}>
    <span style={{fontSize:bold?15:14,fontWeight:bold?700:500,color:bold?(dark?'#fff':'var(--navy)'):(dark?'var(--panel-dark-muted)':'var(--muted)')}}>{label}</span>
    <span style={{fontSize:bold?17:15,fontWeight:bold?700:600,color:accent||(dark?'#fff':'var(--navy-soft)'),whiteSpace:'nowrap'}}>{value}</span>
  </div>)}

function Callout({children,dark}){return(
  <div style={dark
    ? {background:'rgba(160,190,70,.13)',border:'1px solid rgba(160,190,70,.3)',borderRadius:8,padding:'14px 16px',fontSize:13.5,lineHeight:1.55,color:'#dbe6b4',fontWeight:500}
    : {background:'var(--callout)',borderRadius:8,padding:'14px 16px',fontSize:13.5,lineHeight:1.55,color:'var(--green-deep)',fontWeight:500}}>{children}</div>)}

function Stat({label,value,sub,color,large}){return(
  <div style={{flex:1,minWidth:large?170:140,background:'var(--panel)',borderRadius:8,padding:large?'18px 20px':'14px 16px',border:'1px solid var(--border)'}}>
    <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.7,marginBottom:6}}>{label}</div>
    <div style={{fontSize:large?27:20,fontWeight:700,color:color||'var(--navy)',letterSpacing:-.7,lineHeight:1.15}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:'var(--muted)',marginTop:5,lineHeight:1.45}}>{sub}</div>}
  </div>)}

function DebtRow({debt,onUpdate,onRemove,idx}){return(
  <div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap',padding:'12px 0',borderBottom:'1px solid var(--panel-line)'}}>
    <div style={{width:22,textAlign:'center',paddingBottom:12}}><span style={{fontSize:12,fontWeight:600,color:'var(--dim)'}}>{idx}</span></div>
    <div style={{flex:'2 1 160px',display:'flex',flexDirection:'column',gap:6}}>
      <label style={{fontSize:11.5,fontWeight:600,color:'var(--muted)'}}>Creditor</label>
      <div className="field" style={{padding:'9px 12px'}}><input value={debt.name} onChange={e=>onUpdate({...debt,name:e.target.value})} placeholder="e.g. Visa, Auto Loan" style={{fontSize:14.5}}/></div>
    </div>
    <div style={{flex:'1 1 120px',display:'flex',flexDirection:'column',gap:6}}>
      <label style={{fontSize:11.5,fontWeight:600,color:'var(--muted)'}}>Balance</label>
      <div className="field" style={{padding:'9px 12px'}}><span style={{color:'var(--dim)',fontSize:14,fontWeight:500}}>$</span><input type="number" value={debt.balance} onChange={e=>onUpdate({...debt,balance:Number(e.target.value)})} style={{fontSize:14.5}}/></div>
    </div>
    <div style={{flex:'1 1 120px',display:'flex',flexDirection:'column',gap:6}}>
      <label style={{fontSize:11.5,fontWeight:600,color:'var(--muted)'}}>Monthly payment</label>
      <div className="field" style={{padding:'9px 12px'}}><span style={{color:'var(--dim)',fontSize:14,fontWeight:500}}>$</span><input type="number" value={debt.payment} onChange={e=>onUpdate({...debt,payment:Number(e.target.value)})} style={{fontSize:14.5}}/></div>
    </div>
    <button onClick={onRemove} title="Remove debt" aria-label="Remove debt" className="no-print" style={{background:'none',border:'none',cursor:'pointer',color:'var(--dim)',fontSize:20,fontWeight:500,lineHeight:1,padding:'4px 6px',marginBottom:10,transition:'color .15s'}} onMouseEnter={e=>e.currentTarget.style.color='var(--navy)'} onMouseLeave={e=>e.currentTarget.style.color='#aab1c0'}>×</button>
  </div>)}

function CostBar({principal:p,interest:it,saved:sv}){const t=p+it+sv;if(!t)return null;
  const s=[{pct:p/t*100,c:'#1e2b4d',l:'Principal',v:p},{pct:it/t*100,c:'#7d8699',l:'Interest paid',v:it}];
  if(sv/t>.003)s.push({pct:sv/t*100,c:'#6f7f2e',l:'Interest saved',v:sv});
  return(<div>
    <div style={{display:'flex',height:34,borderRadius:8,overflow:'hidden',border:'1px solid var(--border)'}}>{s.map((x,i)=><div key={i} style={{width:x.pct+'%',background:x.c,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11.5,fontWeight:600,transition:'width .5s'}}>{x.pct>14&&x.pct.toFixed(1)+'%'}</div>)}</div>
    <div style={{display:'flex',gap:20,marginTop:11,flexWrap:'wrap'}}>{s.map((x,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:7,fontSize:12.5,color:'var(--navy-soft)'}}><span style={{width:10,height:10,borderRadius:3,background:x.c,display:'inline-block'}}/><span style={{fontWeight:600}}>{x.l}</span><span style={{color:'var(--muted)'}}>{fmt(x.v)}</span></div>)}</div>
  </div>)}

function Chart({stdRows:sr,extRows:er,termMonths:tm}){if(!sr.length)return null;const W=640,H=240,PL=56,PB=36,PT=14,PR=14,mB=sr[0]?.balance||1;const xc=m=>PL+(m/tm)*(W-PL-PR),yc=b=>PT+(1-b/mB)*(H-PT-PB);const sp=Math.max(1,Math.floor(sr.length/100));const mk=rows=>rows.filter((_,i)=>i%sp===0||i===rows.length-1).map((r,i)=>`${i===0?'M':'L'}${xc(r.month).toFixed(1)},${yc(r.balance).toFixed(1)}`).join(' ');const pS=mk(sr),pE=mk(er);const area=pE+` L${xc(er[er.length-1].month).toFixed(1)},${yc(0).toFixed(1)} L${PL},${yc(0).toFixed(1)} Z`;const yT=[0,.25,.5,.75,1].map(f=>f*mB);const xY=[];for(let y=0;y<=Math.ceil(tm/12);y+=5)xY.push(y*12);
  return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:660,display:'block'}}>
    <defs><linearGradient id="aG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#1e2b4d" stopOpacity=".13"/><stop offset="100%" stopColor="#1e2b4d" stopOpacity=".02"/></linearGradient></defs>
    {yT.map((v,i)=><g key={i}><line x1={PL} y1={yc(v)} x2={W-PR} y2={yc(v)} stroke="#dee1e9" strokeWidth={.8}/><text x={PL-8} y={yc(v)+4} textAnchor="end" fontSize={10} fill="#7d8699" fontFamily="Inter">{v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v.toFixed(0)}</text></g>)}
    {xY.map((m,i)=><text key={i} x={xc(m)} y={H-8} textAnchor="middle" fontSize={10} fill="#7d8699" fontFamily="Inter">Yr {m/12}</text>)}
    <path d={area} fill="url(#aG)"/>
    <path d={pS} fill="none" stroke="#a9afbc" strokeWidth={2.2} strokeDasharray="6 3"/>
    <path d={pE} fill="none" stroke="#1e2b4d" strokeWidth={2.8}/>
    {er.length<sr.length&&<g><line x1={xc(er[er.length-1].month)} y1={PT} x2={xc(er[er.length-1].month)} y2={yc(0)} stroke="#6f7f2e" strokeWidth={1.2} strokeDasharray="4 3" opacity={.6}/><text x={xc(er[er.length-1].month)} y={PT+10} textAnchor="middle" fontSize={9.5} fill="#6f7f2e" fontWeight="600" fontFamily="Inter">Paid off</text></g>}
    <g transform={`translate(${W-180},${PT+4})`}><line x1={0} y1={0} x2={20} y2={0} stroke="#a9afbc" strokeWidth={2} strokeDasharray="6 3"/><text x={24} y={4} fontSize={10.5} fill="#7d8699" fontFamily="Inter">Standard payoff</text><line x1={0} y1={18} x2={20} y2={18} stroke="#1e2b4d" strokeWidth={2.8}/><text x={24} y={22} fontSize={10.5} fill="#7d8699" fontFamily="Inter">With extra payments</text></g>
  </svg>)}

function ConsolidationBar({curMtgBal:mb,totDebtBal:db,cashInHand:ch,principal:p}){
  const Part=({label,val,color})=>(<div style={{flex:'1 1 125px'}}><div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.6}}>{label}</div><div style={{fontSize:19,fontWeight:700,color:color||'var(--navy)',marginTop:4}}>{fmt(val)}</div></div>);
  const Op=({c})=>(<div style={{fontSize:20,fontWeight:400,color:'#c7cddb',userSelect:'none'}}>{c}</div>);
  return(<div style={{marginTop:18,padding:'18px 20px',background:'var(--panel)',borderRadius:8,border:'1px solid var(--border)'}}>
    <div style={{display:'flex',flexWrap:'wrap',gap:14,alignItems:'center'}}>
      <Part label="Current balance" val={mb}/><Op c="+"/><Part label="Debts consolidated" val={db}/>
      {(ch||0)>0&&<React.Fragment><Op c="+"/><Part label="Cash in hand" val={ch} color="var(--green)"/></React.Fragment>}
      <Op c="="/>
      <div style={{flex:'1 1 160px'}}><div style={{fontSize:11,fontWeight:600,color:'var(--navy)',textTransform:'uppercase',letterSpacing:.6}}>New loan amount</div><div style={{fontSize:27,fontWeight:800,color:'var(--navy)',marginTop:4,letterSpacing:-.8}}>{fmt(p)}</div></div>
    </div>
  </div>)}

function AmortTable({rows,basePI}){return(
  <div style={{marginTop:16,maxHeight:440,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8}}>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
      <thead><tr style={{background:'var(--panel)',position:'sticky',top:0,zIndex:2}}>{['Mo.','Payment','Principal','Interest','Extra','Balance'].map(h=><th key={h} style={{padding:'10px',textAlign:'right',fontWeight:600,color:'var(--muted)',fontSize:11,letterSpacing:.4,borderBottom:'1px solid var(--border)'}}>{h}</th>)}</tr></thead>
      <tbody>{rows.map((r,i)=>{const bp=basePI-r.interest;const ex=r.principal-Math.max(0,bp);const yr=r.month%12===0;return(
        <tr key={r.month} style={{background:yr?'var(--panel)':'#fff',borderBottom:'1px solid #eef1f6'}}>
          <td style={{padding:'6px 10px',textAlign:'right',color:'var(--dim)',fontWeight:yr?600:400}}>{yr?`Yr ${r.month/12}`:r.month}</td>
          <td style={{padding:'6px 10px',textAlign:'right',fontWeight:500}}>{fmt(r.payment)}</td>
          <td style={{padding:'6px 10px',textAlign:'right',color:'var(--navy)',fontWeight:500}}>{fmt(Math.max(0,bp))}</td>
          <td style={{padding:'6px 10px',textAlign:'right',color:'var(--muted)'}}>{fmt(r.interest)}</td>
          <td style={{padding:'6px 10px',textAlign:'right',color:'var(--green)',fontWeight:600}}>{ex>.01?fmt(ex):'—'}</td>
          <td style={{padding:'6px 10px',textAlign:'right',fontWeight:600}}>{fmt(r.balance)}</td>
        </tr>)})}</tbody>
    </table>
  </div>)}

/* ── Client presentation ───────────────────────────────────── */
function PresentModal({onClose,R,rate,termYrs,totDebtBal,totDebtPmt,debts,applyDebtSav,extraPmt,curTotalMtg,curMtgBal,cashInHand}){
  const epy=Math.floor(R.extA.months/12),epm=R.extA.months%12,ys=Math.floor(R.moSaved/12),ms=R.moSaved%12,tco=curTotalMtg+totDebtPmt;
  const activeDebts=debts.filter(d=>d.balance>0);
  const Sec=({title,children,style:s})=>(<div style={{marginTop:30,...s}}>
    <h3 style={{fontSize:12,fontWeight:700,color:'var(--muted)',letterSpacing:1.1,textTransform:'uppercase',marginBottom:14}}>{title}</h3>{children}</div>);

  return(
    <div className="present-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="present-page" role="dialog" aria-label="New loan presentation">

        <div style={{background:'var(--navy)',padding:'26px 36px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:16,flexWrap:'wrap'}}>
          <div>
            <h2 style={{fontSize:23,fontWeight:700,color:'#fff',letterSpacing:-.4}}>New Loan Presentation</h2>
            <div style={{fontSize:11,fontWeight:600,color:'var(--gold)',textTransform:'uppercase',letterSpacing:2,marginTop:5}}>Prepared for your review</div>
          </div>
          <button onClick={onClose} aria-label="Close" className="no-print" style={{background:'rgba(255,255,255,.12)',border:'none',borderRadius:8,width:38,height:38,cursor:'pointer',color:'#fff',fontSize:21,display:'flex',alignItems:'center',justifyContent:'center'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.22)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.12)'}>×</button>
        </div>

        <div style={{padding:'4px 36px 36px'}}>

          {/* Headline number */}
          <div style={{marginTop:26,background:'var(--panel)',borderRadius:12,padding:'26px 28px',textAlign:'center'}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1.6}}>Your new total monthly payment</div>
            <div style={{fontSize:56,fontWeight:800,color:'var(--green)',letterSpacing:-2.5,lineHeight:1.05,marginTop:6}}>{fmt0(R.totalPITI)}<span style={{fontSize:22,fontWeight:600,color:'var(--muted)',letterSpacing:-.5}}>/mo</span></div>
            <div style={{fontSize:13.5,color:'var(--muted)',marginTop:6}}>Down from {fmt0(tco)}/mo across your mortgage and {activeDebts.length} debts</div>
          </div>

          <Sec title="What you pay today">
            <div style={{border:'1px solid var(--border)',borderRadius:10,padding:'6px 20px 14px'}}>
              <SumRow label="Mortgage payment (PITI)" value={fmt(curTotalMtg)}/>
              <SumRow label="Monthly debt payments" value={fmt(totDebtPmt)}/>
              <SumRow label="Total monthly outgoing" value={fmt(tco)} bold/>
            </div>
          </Sec>

          <Sec title="Your new payment">
            <div style={{border:'1px solid var(--border)',borderRadius:10,padding:'6px 20px 14px'}}>
              <SumRow label="Loan amount" value={fmt(R.principal)}/>
              <SumRow label="Principal & interest" value={fmt(R.basePI)}/>
              <SumRow label="Taxes / mo" value={fmt(R.mTax)}/>
              <SumRow label="Insurance / mo" value={fmt(R.mIns)}/>
              <SumRow label="Debt payments" value="$0.00" accent="var(--green)"/>
              <SumRow label="Total monthly (PITI)" value={fmt(R.totalPITI)} bold/>
            </div>
          </Sec>

          {activeDebts.length>0&&<Sec title="Debts paid off at closing">
            <div style={{borderRadius:10,border:'1px solid var(--border)',overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5}}>
                <thead><tr style={{background:'var(--navy)'}}>
                  {['Creditor','Balance','Current payment','New payment'].map((h,i)=><th key={h} style={{padding:'12px 16px',textAlign:i===0?'left':i===3?'center':'right',fontSize:11,fontWeight:600,color:'#fff',textTransform:'uppercase',letterSpacing:.8}}>{h}</th>)}
                </tr></thead>
                <tbody>{activeDebts.map((d,i)=>(
                  <tr key={i} style={{background:i%2===0?'#fff':'var(--panel)',borderBottom:'1px solid var(--panel-line)'}}>
                    <td style={{padding:'12px 16px',fontWeight:600,color:'var(--navy-soft)'}}>{d.name||'Unnamed'}</td>
                    <td style={{padding:'12px 16px',textAlign:'right',fontWeight:600,color:'var(--navy)'}}>{fmt(d.balance)}</td>
                    <td style={{padding:'12px 16px',textAlign:'right',fontWeight:600,color:'var(--navy)'}}>{fmt(d.payment)}</td>
                    <td style={{padding:'12px 16px',textAlign:'center'}}><span style={{display:'inline-block',background:'var(--callout)',color:'var(--green-deep)',padding:'5px 14px',borderRadius:14,fontSize:13.5,fontWeight:700}}>$0.00</span></td>
                  </tr>))}</tbody>
                <tfoot><tr style={{background:'var(--panel)',borderTop:'2px solid var(--navy)'}}>
                  <td style={{padding:'13px 16px',fontWeight:700,color:'var(--navy)'}}>Totals</td>
                  <td style={{padding:'13px 16px',textAlign:'right',fontWeight:700,color:'var(--navy)'}}>{fmt(totDebtBal)}</td>
                  <td style={{padding:'13px 16px',textAlign:'right',fontWeight:700,color:'var(--navy)'}}>{fmt(totDebtPmt)}/mo</td>
                  <td style={{padding:'13px 16px',textAlign:'center',fontWeight:700,color:'var(--green)'}}>$0.00</td>
                </tr></tfoot>
              </table>
            </div>
            <div style={{marginTop:12}}><Callout>All {activeDebts.length} debts are paid in full at closing and folded into one mortgage payment — {activeDebts.length} separate bills go away.</Callout></div>
          </Sec>}

          {(cashInHand||0)>0&&<Sec title="Cash in hand at closing">
            <div style={{background:'var(--panel)',borderRadius:10,padding:'22px 24px'}}>
              <div style={{fontSize:38,fontWeight:800,color:'var(--navy)',letterSpacing:-1.2}}>{fmt(cashInHand)}</div>
              <div style={{fontSize:13.5,color:'var(--muted)',marginTop:6,lineHeight:1.55}}>Included in your new loan and available to you at closing for home improvements, reserves, or other goals.</div>
            </div>
          </Sec>}

          <Sec title="Your estimated savings">
            <div style={{display:'flex',flexWrap:'wrap',gap:14}}>
              <div style={{flex:'1 1 240px',background:'var(--panel)',borderRadius:10,padding:'22px 24px'}}>
                <div style={{fontSize:11.5,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1}}>Monthly cash flow freed up</div>
                <div style={{fontSize:40,fontWeight:800,color:'var(--green)',marginTop:6,letterSpacing:-1.4}}>{fmt(R.monthlySav)}</div>
              </div>
              <div style={{flex:'1 1 240px',background:'var(--panel)',borderRadius:10,padding:'22px 24px'}}>
                <div style={{fontSize:11.5,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1}}>Estimated annual savings</div>
                <div style={{fontSize:40,fontWeight:800,color:'var(--green)',marginTop:6,letterSpacing:-1.4}}>{fmt(R.monthlySav*12)}</div>
              </div>
            </div>
            <p style={{fontSize:13,color:'var(--muted)',lineHeight:1.65,marginTop:14}}>These are estimates based on the figures provided. Actual savings depend on final loan terms, closing costs, and your circumstances, and are not a guarantee of future results.</p>
          </Sec>

          <Sec title="Accelerate your payoff">
            <div style={{display:'flex',flexWrap:'wrap',gap:14}}>
              <div style={{flex:'1 1 240px',background:'var(--panel)',borderRadius:10,padding:'22px 24px'}}>
                <div style={{fontSize:11.5,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1}}>Payoff accelerated by</div>
                <div style={{fontSize:34,fontWeight:800,color:'var(--navy)',marginTop:6,letterSpacing:-1}}>{R.moSaved>0?`${ys}yr ${ms}mo`:'—'}</div>
                <div style={{fontSize:12.5,color:'var(--muted)',marginTop:5}}>Paid in {epy}yr {epm}mo instead of {termYrs}yr</div>
              </div>
              <div style={{flex:'1 1 240px',background:'var(--panel)',borderRadius:10,padding:'22px 24px'}}>
                <div style={{fontSize:11.5,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1}}>Total interest saved</div>
                <div style={{fontSize:34,fontWeight:800,color:'var(--green)',marginTop:6,letterSpacing:-1}}>{fmt(R.intSaved)}</div>
                <div style={{fontSize:12.5,color:'var(--muted)',marginTop:5}}>vs. minimum payments over {termYrs} years</div>
              </div>
            </div>
            {applyDebtSav&&<div style={{marginTop:12}}><Callout>This assumes you put the {fmt(R.totalExtra)}/mo you free up back toward principal{extraPmt>0?` (${fmt(R.monthlySav)} in savings plus ${fmt(extraPmt)} extra)`:''}. Paying the minimum instead still lowers your monthly cost.</Callout></div>}
          </Sec>

          <Sec title="Your loan terms">
            <div style={{display:'flex',flexWrap:'wrap',gap:14}}>
              {[['Interest rate',`${rate}%`,'Fixed rate'],['Loan term',`${termYrs} years`,`${termYrs*12} payments`],['New loan amount',fmt0(R.principal),'Total financed']].map((t,i)=>(
                <div key={i} style={{flex:'1 1 200px',background:'var(--panel)',borderRadius:10,padding:'18px 22px',textAlign:'center'}}>
                  <div style={{fontSize:11.5,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.9}}>{t[0]}</div>
                  <div style={{fontSize:30,fontWeight:800,color:'var(--navy)',letterSpacing:-1,marginTop:5}}>{t[1]}</div>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>{t[2]}</div>
                </div>))}
            </div>
          </Sec>

          <div className="no-print" style={{display:'flex',justifyContent:'center',marginTop:32}}>
            <button onClick={onClose} style={{background:'#fff',color:'var(--muted)',border:'1.5px solid var(--border)',borderRadius:8,padding:'13px 26px',fontSize:14.5,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>← Back to calculator</button>
          </div>

          <p style={{textAlign:'center',fontSize:11.5,color:'var(--dim)',marginTop:18,lineHeight:1.6}}>For illustrative and educational purposes only. Not a loan commitment, approval, or financial advice. Actual terms, rates, fees, and payments may differ.</p>
        </div>
      </div>
    </div>);
}

/* ── App ───────────────────────────────────────────────────── */
function App(){
  const[curLoanType,setCurLoanType]=useState('Conventional');
  const[curMtgBal,setCurMtgBal]=useState(280000);
  const[curRate,setCurRate]=useState(6.5);
  const[curOrigTerm,setCurOrigTerm]=useState(30);
  const[curPIManual,setCurPIManual]=useState(null);
  const[curTax,setCurTax]=useState(300);const[curTaxMode,setCurTaxMode]=useState('monthly');
  const[curIns,setCurIns]=useState(125);const[curInsMode,setCurInsMode]=useState('monthly');
  const[curMIP,setCurMIP]=useState(0);const[curMIPMode,setCurMIPMode]=useState('monthly');
  const[curUpfrontMIP,setCurUpfrontMIP]=useState(0);

  // P&I auto-calculates from balance + rate + term; typing your own value overrides it.
  const curPIAuto=monthlyPI(curMtgBal||0,(curRate||0)/100,(curOrigTerm||0)*12);
  const curPI=curPIManual!=null?curPIManual:Math.round(curPIAuto*100)/100;
  const curPIOverridden=curPIManual!=null;

  const curMoTax=curTaxMode==='annual'?(curTax||0)/12:(curTax||0);
  const curMoIns=curInsMode==='annual'?(curIns||0)/12:(curIns||0);
  const curMoEscrow=curMoTax+curMoIns;
  const curMoMI=curLoanType==='FHA'?(curMIPMode==='annual'?(curMIP||0)/12:(curMIP||0)):0;
  const curTotalMtg=(curPI||0)+curMoEscrow+curMoMI;

  const[debts,setDebts]=useState([{id:1,name:"Visa Credit Card",balance:8500,payment:250},{id:2,name:"Mastercard",balance:5200,payment:160},{id:3,name:"Auto Loan",balance:15000,payment:420},{id:4,name:"Student Loan",balance:12000,payment:180},{id:5,name:"Personal Loan",balance:4800,payment:125}]);
  const[nextId,setNextId]=useState(6);
  const addDebt=()=>{setDebts([...debts,{id:nextId,name:"",balance:0,payment:0}]);setNextId(nextId+1)};
  const rmDebt=id=>setDebts(debts.filter(d=>d.id!==id));
  const updDebt=(id,u)=>setDebts(debts.map(d=>d.id===id?u:d));
  const totDebtBal=debts.reduce((s,d)=>s+(d.balance||0),0),totDebtPmt=debts.reduce((s,d)=>s+(d.payment||0),0);
  const activeDebtCount=debts.filter(d=>d.balance>0).length;

  const[rate,setRate]=useState(6.75);const[termYrs,setTermYrs]=useState(30);
  const[annTax,setAnnTax]=useState(3600);const[taxMode,setTaxMode]=useState('annual');
  const[annIns,setAnnIns]=useState(1500);const[insMode,setInsMode]=useState('annual');
  const[cashInHand,setCashInHand]=useState(0);
  const[extraPmt,setExtraPmt]=useState(0);const[applyDebtSav,setApplyDebtSav]=useState(true);
  const[showAmort,setShowAmort]=useState(false);const[showPresent,setShowPresent]=useState(false);

  const R=useMemo(()=>{
    const principal=(curMtgBal||0)+totDebtBal+(cashInHand||0);
    const ar=(rate||0)/100,tm=(termYrs||30)*12;
    const mTax=taxMode==='annual'?(annTax||0)/12:(annTax||0);
    const mIns=insMode==='annual'?(annIns||0)/12:(annIns||0);
    const basePI=monthlyPI(principal,ar,tm);
    const totalPITI=basePI+mTax+mIns;
    const monthlySav=Math.max(0,(curTotalMtg+totDebtPmt)-totalPITI);
    const totalExtra=(extraPmt||0)+(applyDebtSav?monthlySav:0);
    const stdA=amortize(principal,ar,tm,0);
    const extA=amortize(principal,ar,tm,totalExtra);
    const intSaved=stdA.totalInterest-extA.totalInterest;
    const moSaved=stdA.months-extA.months;
    const effRate=totalExtra>0?findEffRate(principal,extA.totalInterest,tm):ar;
    return{principal,basePI,totalPITI,monthlySav,totalExtra,stdA,extA,intSaved,moSaved,effRate,ar,tm,mTax,mIns,mMI:0};
  },[curMtgBal,rate,termYrs,annTax,taxMode,annIns,insMode,cashInHand,extraPmt,debts,applyDebtSav,totDebtBal,totDebtPmt,curTotalMtg]);

  const ys=Math.floor(R.moSaved/12),ms=R.moSaved%12,epy=Math.floor(R.extA.months/12),epm=R.extA.months%12;
  const tco=curTotalMtg+totDebtPmt;

  return(<div style={{maxWidth:1120,margin:'0 auto',padding:'26px 18px 72px'}}>
    {showPresent&&<PresentModal onClose={()=>setShowPresent(false)} R={R} rate={rate} termYrs={termYrs} totDebtBal={totDebtBal} totDebtPmt={totDebtPmt} debts={debts} applyDebtSav={applyDebtSav} extraPmt={extraPmt} curTotalMtg={curTotalMtg} curMtgBal={curMtgBal} cashInHand={cashInHand}/>}

    {/* Masthead */}
    <div className="animate-in" style={{background:'var(--navy)',borderRadius:'10px 10px 0 0',padding:'20px 28px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:16,flexWrap:'wrap'}}>
      <div>
        <h1 style={{fontSize:23,fontWeight:700,color:'#fff',letterSpacing:-.4}}>Mortgage Debt Calculator</h1>
        <div style={{fontSize:12.5,fontWeight:600,color:'var(--gold)',textTransform:'uppercase',letterSpacing:2,marginTop:4}}>Current Loan Details</div>
      </div>
      <div style={{fontSize:12.5,fontWeight:600,color:'rgba(255,255,255,.55)',textTransform:'uppercase',letterSpacing:2}}>Turn many payments into one.</div>
    </div>

    {/* Split: inputs left, live summary right */}
    <div className="animate-in" style={{display:'flex',flexWrap:'wrap',background:'#fff',border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 10px 10px',overflow:'hidden',animationDelay:'40ms'}}>

      {/* LEFT — current loan inputs */}
      <div style={{flex:'1 1 460px',minWidth:300,padding:'26px 28px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>

          <LoanTypeToggle value={curLoanType} onChange={setCurLoanType}/>

          <Inp label="Current mortgage balance" value={curMtgBal} onChange={setCurMtgBal} prefix="$"/>

          <div style={{display:'flex',flexWrap:'wrap',gap:14}}>
            <Inp label="Interest rate" value={curRate} onChange={setCurRate} suffix="%" step="0.125"/>
            <Inp label="Original term (years)" value={curOrigTerm} onChange={setCurOrigTerm} suffix="yr"/>
          </div>

          {/* P&I — auto-calculated, override allowed */}
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
              <label className="lbl">Principal &amp; interest</label>
              {curPIOverridden
                ? <button onClick={()=>setCurPIManual(null)} className="no-print" style={{fontSize:11,fontWeight:600,color:'var(--navy)',background:'none',border:'none',cursor:'pointer',padding:0,fontFamily:'inherit',textDecoration:'underline'}}>Reset to auto</button>
                : <span style={{fontSize:10.5,fontWeight:700,color:'var(--green-deep)',background:'var(--callout)',borderRadius:4,padding:'2px 7px',textTransform:'uppercase',letterSpacing:.7}}>Auto</span>}
            </div>
            <div className="field" style={{background:curPIOverridden?'#fff':'var(--panel)'}}>
              <span style={{color:'var(--dim)',fontSize:15,fontWeight:500,userSelect:'none'}}>$</span>
              <input type="number" value={curPI} onChange={e=>setCurPIManual(e.target.value===""?null:Number(e.target.value))}/>
            </div>
            <div style={{fontSize:11.5,color:'var(--muted)'}}>{curPIOverridden?`Auto would be ${fmt(curPIAuto)} — using your figure.`:'Calculated from balance, rate and term. Type over it to use the statement figure.'}</div>
          </div>

          <div style={{display:'flex',flexWrap:'wrap',gap:14}}>
            <ModeInp label="Property taxes" value={curTax} onChange={setCurTax} mode={curTaxMode} onModeChange={setCurTaxMode} prefix="$" hint={curTaxMode==='annual'?`= ${fmt(curMoTax)}/mo`:null}/>

            <ModeInp label="Homeowners insurance" value={curIns} onChange={setCurIns} mode={curInsMode} onModeChange={setCurInsMode} prefix="$" hint={curInsMode==='annual'?`= ${fmt(curMoIns)}/mo`:null}/>
          </div>

          {curLoanType==='FHA'&&<div style={{display:'flex',flexWrap:'wrap',gap:14}}>
            <ModeInp label="MIP (mortgage insurance)" value={curMIP} onChange={setCurMIP} mode={curMIPMode} onModeChange={setCurMIPMode} prefix="$" hint={curMIPMode==='annual'&&curMIP>0?`= ${fmt(curMoMI)}/mo`:null}/>
            <Inp label="Upfront MIP financed" value={curUpfrontMIP} onChange={setCurUpfrontMIP} prefix="$" hint="Usually already inside the payoff balance above."/>
          </div>}

        </div>
      </div>

      {/* RIGHT — live summary */}
      <div style={{flex:'1 1 360px',minWidth:290,background:'var(--panel-dark)',padding:'26px 28px'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--panel-dark-muted)',textTransform:'uppercase',letterSpacing:1.6}}>Their total monthly outgoing</div>
          <div style={{fontSize:50,fontWeight:800,color:'var(--green-bright)',letterSpacing:-2.2,lineHeight:1.05,marginTop:4}}>{fmt0(tco)}<span style={{fontSize:20,fontWeight:600,color:'var(--panel-dark-muted)',letterSpacing:-.5}}>/mo</span></div>
        </div>

        <div style={{marginTop:16}}>
          <Callout dark>
            {activeDebtCount>0
              ? <>That's the mortgage plus {activeDebtCount} separate debt payments. Consolidating replaces all of it with one payment of <strong style={{color:'#fff'}}>{fmt0(R.totalPITI)}/mo</strong>.</>
              : <>Add their debts below to see what consolidating into one payment would look like.</>}
          </Callout>
        </div>

        <div style={{marginTop:18}}>
          <SumRow dark label="Mortgage balance" value={fmt0(curMtgBal)}/>
          <SumRow dark label="Principal & interest" value={fmt(curPI)}/>
          <SumRow dark label="Taxes / mo" value={fmt(curMoTax)}/>
          <SumRow dark label="Insurance / mo" value={fmt(curMoIns)}/>
          {curLoanType==='FHA'&&<SumRow dark label="MIP / mo" value={fmt(curMoMI)}/>}
          <SumRow dark label="Current mortgage payment" value={fmt(curTotalMtg)} bold/>
          <SumRow dark label={`Debt payments (${activeDebtCount})`} value={fmt(totDebtPmt)}/>
          <SumRow dark label="Total monthly outgoing" value={fmt(tco)} bold accent="var(--green-bright)"/>
        </div>

        <div style={{marginTop:14,fontSize:11.5,color:'var(--panel-dark-muted)',lineHeight:1.5}}>{curLoanType} · {curRate||0}% · {curOrigTerm||0}-year term</div>
      </div>
    </div>

    <div style={{display:'flex',flexDirection:'column',gap:18,marginTop:18}}>

      <Card title="Debts to consolidate" subtitle="Each debt from the credit report that will be rolled into the new mortgage." delay={80}>
        <div style={{display:'flex',flexDirection:'column'}}>{debts.map((d,i)=><DebtRow key={d.id} debt={d} idx={i+1} onUpdate={u=>updDebt(d.id,u)} onRemove={()=>rmDebt(d.id)}/>)}</div>
        <button onClick={addDebt} className="no-print" style={{marginTop:16,background:'#fff',border:'1.5px dashed var(--border)',borderRadius:8,padding:'11px 22px',cursor:'pointer',fontSize:13.5,fontWeight:600,color:'var(--muted)',fontFamily:'inherit',transition:'all .2s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--navy)';e.currentTarget.style.color='var(--navy)'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)'}}>+ Add debt</button>

        <div style={{marginTop:18,padding:'18px 20px',background:'var(--panel)',borderRadius:8,border:'1px solid var(--border)',display:'flex',flexWrap:'wrap',gap:20}}>
          <div style={{flex:'1 1 150px'}}><div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.6}}>Total debt balance</div><div style={{fontSize:23,fontWeight:700,color:'var(--navy)',marginTop:4}}>{fmt(totDebtBal)}</div></div>
          <div style={{flex:'1 1 150px'}}><div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.6}}>Total debt payments</div><div style={{fontSize:23,fontWeight:700,color:'var(--navy)',marginTop:4}}>{fmt(totDebtPmt)}<span style={{fontSize:13,fontWeight:500,color:'var(--muted)'}}>/mo</span></div></div>
          <div style={{flex:'1 1 170px'}}><div style={{fontSize:11,fontWeight:600,color:'var(--green-deep)',textTransform:'uppercase',letterSpacing:.6}}>Total monthly outgoing</div><div style={{fontSize:26,fontWeight:800,color:'var(--green)',marginTop:4,letterSpacing:-.8}}>{fmt(tco)}<span style={{fontSize:13,fontWeight:500,color:'var(--muted)'}}>/mo</span></div></div>
        </div>
      </Card>

      <Card title="New loan details" delay={120}>
        <div style={{display:'flex',flexWrap:'wrap',gap:14}}>
          <Inp label="Interest rate" value={rate} onChange={setRate} suffix="%" step="0.125"/>
          <Inp label="Loan term (years)" value={termYrs} onChange={setTermYrs} suffix="yr"/>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:14,marginTop:16}}>
          <ModeInp label="Property taxes" value={annTax} onChange={setAnnTax} mode={taxMode} onModeChange={setTaxMode} prefix="$"/>
          <ModeInp label="Homeowners insurance" value={annIns} onChange={setAnnIns} mode={insMode} onModeChange={setInsMode} prefix="$"/>
          <Inp label="Cash in hand" value={cashInHand} onChange={setCashInHand} prefix="$"/>
        </div>
        <ConsolidationBar curMtgBal={curMtgBal} totDebtBal={totDebtBal} cashInHand={cashInHand} principal={R.principal}/>
      </Card>

      <Card title="Monthly payment comparison" delay={160}>
        <div style={{display:'flex',flexWrap:'wrap',gap:16}}>
          <div style={{flex:'1 1 250px',border:'1px solid var(--border)',borderRadius:10,padding:'6px 20px 14px'}}>
            <div style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,padding:'14px 0 2px'}}>Paying now</div>
            <SumRow label="Mortgage (PITI)" value={fmt(curTotalMtg)}/>
            <SumRow label="Debt payments" value={fmt(totDebtPmt)}/>
            <SumRow label="Total" value={fmt(tco)} bold/>
          </div>
          <div style={{flex:'1 1 250px',border:'1px solid var(--border)',borderRadius:10,padding:'6px 20px 14px'}}>
            <div style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,padding:'14px 0 2px'}}>New payment</div>
            <SumRow label="Principal & interest" value={fmt(R.basePI)}/>
            <SumRow label="Escrow (taxes + ins)" value={fmt(R.mTax+R.mIns)}/>
            <SumRow label="Debt payments" value="$0.00" accent="var(--green)"/>
            <SumRow label="Total" value={fmt(R.totalPITI)} bold accent="var(--green)"/>
          </div>
        </div>

        <div style={{marginTop:18,background:'var(--panel)',borderRadius:10,padding:'22px 24px',display:'flex',flexWrap:'wrap',gap:26,alignItems:'center'}}>
          <div style={{flex:'1 1 240px'}}>
            <div style={{fontSize:11.5,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1}}>Monthly savings</div>
            <div style={{fontSize:42,fontWeight:800,color:'var(--green)',marginTop:4,letterSpacing:-1.6}}>{fmt(R.monthlySav)}<span style={{fontSize:16,fontWeight:600,color:'var(--muted)'}}>/mo</span></div>
            <div style={{fontSize:13,color:'var(--muted)',marginTop:5}}>{fmt(tco)} → {fmt(R.totalPITI)} · {fmt(R.monthlySav*12)} a year</div>
          </div>
          <div style={{flex:'1 1 230px',display:'flex',flexDirection:'column',gap:14}}>
            <label style={{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer'}} className="no-print">
              <input type="checkbox" checked={applyDebtSav} onChange={e=>setApplyDebtSav(e.target.checked)} style={{width:18,height:18,accentColor:'#6f7f2e',marginTop:2,flexShrink:0}}/>
              <span><span style={{fontSize:14,fontWeight:600,color:'var(--navy)'}}>Put the savings back into principal</span><br/><span style={{fontSize:12.5,color:'var(--muted)'}}>Extra: <strong style={{color:'var(--green)'}}>{fmt(R.totalExtra)}</strong>/mo</span></span>
            </label>
            <Inp label="Additional extra payment" value={extraPmt} onChange={setExtraPmt} prefix="$"/>
          </div>
        </div>
      </Card>

      <Card title="Interest savings and payoff" delay={200}>
        <div style={{display:'flex',flexWrap:'wrap',gap:14}}>
          <Stat label="Effective rate" value={fmtPct(R.effRate)} sub={`Your ${rate}% behaves like ${fmtPct(R.effRate)} with ${fmt(R.totalExtra)}/mo extra.`} color="var(--navy)" large/>
          <Stat label="Total interest saved" value={fmt(R.intSaved)} sub={R.totalExtra>0?`vs. minimum payments over ${termYrs} years`:"Add extra payments to see savings"} color="var(--green)" large/>
          <Stat label="Payoff accelerated by" value={R.moSaved>0?`${ys}yr ${ms}mo`:"—"} sub={R.totalExtra>0?`Paid in ${epy}yr ${epm}mo instead of ${termYrs}yr`:""} color="var(--navy)" large/>
        </div>
        <div style={{marginTop:26}}><h3 style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Total loan cost</h3><CostBar principal={R.principal} interest={R.extA.totalInterest} saved={R.intSaved}/></div>
        <div style={{marginTop:26}}><h3 style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Balance over time</h3><Chart stdRows={R.stdA.rows} extRows={R.extA.rows} termMonths={R.tm}/></div>
        <div style={{marginTop:26,overflowX:'auto'}}>
          <h3 style={{fontSize:11.5,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Side by side</h3>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5}}>
            <thead><tr style={{borderBottom:'1.5px solid var(--border)'}}>
              <th style={{padding:'9px 12px',textAlign:'left',fontWeight:600,fontSize:11.5,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.6}}></th>
              <th style={{padding:'9px 12px',textAlign:'right',fontWeight:600,fontSize:11.5,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.6}}>Minimum only</th>
              <th style={{padding:'9px 12px',textAlign:'right',fontWeight:600,fontSize:11.5,color:'var(--navy)',textTransform:'uppercase',letterSpacing:.6}}>With extra</th>
              <th style={{padding:'9px 12px',textAlign:'right',fontWeight:600,fontSize:11.5,color:'var(--green-deep)',textTransform:'uppercase',letterSpacing:.6}}>Difference</th>
            </tr></thead>
            <tbody>{[["Monthly payment",fmt(R.basePI),fmt(R.basePI+R.totalExtra),fmt(R.totalExtra)],["Total interest",fmt(R.stdA.totalInterest),fmt(R.extA.totalInterest),fmt(R.intSaved)],["Total cost",fmt(R.principal+R.stdA.totalInterest),fmt(R.principal+R.extA.totalInterest),fmt(R.intSaved)],["Payoff time",`${termYrs}yr 0mo`,`${epy}yr ${epm}mo`,R.moSaved>0?`${ys}yr ${ms}mo earlier`:"—"]].map((r,i)=>(
              <tr key={i} style={{borderBottom:'1px solid var(--panel-line)',background:i%2===0?'var(--panel)':'#fff'}}>
                <td style={{padding:'11px 12px',fontWeight:600,color:'var(--navy-soft)'}}>{r[0]}</td>
                <td style={{padding:'11px 12px',textAlign:'right',color:'var(--dim)'}}>{r[1]}</td>
                <td style={{padding:'11px 12px',textAlign:'right',color:'var(--navy)',fontWeight:600}}>{r[2]}</td>
                <td style={{padding:'11px 12px',textAlign:'right',color:'var(--green)',fontWeight:700}}>{r[3]}</td>
              </tr>))}</tbody>
          </table>
        </div>
      </Card>

      <div className="no-print animate-in" style={{display:'flex',justifyContent:'center',animationDelay:'220ms'}}>
        <button onClick={()=>setShowPresent(true)} style={{background:'var(--navy)',color:'#fff',border:'none',borderRadius:10,padding:'18px 48px',fontSize:16.5,fontWeight:700,cursor:'pointer',fontFamily:'inherit',boxShadow:'0 4px 18px rgba(30,43,77,.28)',transition:'transform .18s,box-shadow .18s'}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-1px)';e.currentTarget.style.boxShadow='0 8px 26px rgba(30,43,77,.36)'}} onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 4px 18px rgba(30,43,77,.28)'}}>Present new loan to client</button>
      </div>

      <Card title="Full amortization schedule" delay={250}>
        <button onClick={()=>setShowAmort(!showAmort)} className="no-print" style={{background:showAmort?'var(--navy)':'#fff',color:showAmort?'#fff':'var(--navy)',border:'1.5px solid var(--navy)',borderRadius:8,padding:'11px 24px',cursor:'pointer',fontSize:13.5,fontWeight:600,fontFamily:'inherit',transition:'all .2s'}}>{showAmort?'Hide schedule':'Show month-by-month schedule'}</button>
        {showAmort&&<AmortTable rows={R.extA.rows} basePI={R.basePI}/>}
      </Card>

      <p style={{textAlign:'center',fontSize:12,color:'var(--muted)',marginTop:6,lineHeight:1.65}}>For illustrative purposes only. Not a loan commitment or financial advice.<br/>Actual terms, rates, fees, and payments may vary.</p>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
